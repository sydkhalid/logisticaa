name: Hostinger CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, json, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run tests
        run: php artisan test

      - name: Build frontend assets
        run: |
          npm ci
          npm run prod

      - name: Prune dev PHP dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Create release archive
        run: |
          rm -rf node_modules
          rm -rf storage/logs/* storage/framework/cache/data/* storage/framework/sessions/* storage/framework/views/* storage/app/backups/*
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='release.tar.gz' \
            -czf release.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: logisticaa-release
          path: release.tar.gz
          retention-days: 3

  deploy:
    name: Deploy to Hostinger
    needs: test-build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: logisticaa-release

      - name: Prepare SSH
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          test -n "$HOSTINGER_HOST"
          test -n "$HOSTINGER_USER"
          test -n "$HOSTINGER_SSH_KEY"
          test -n "$HOSTINGER_DEPLOY_PATH"

          PORT="${HOSTINGER_PORT:-65002}"
          mkdir -p ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          ssh-keyscan -p "$PORT" "$HOSTINGER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/hostinger_deploy_key -p "$PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "mkdir -p '$HOSTINGER_DEPLOY_PATH'"

      - name: Upload release to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          PORT="${HOSTINGER_PORT:-65002}"
          scp -i ~/.ssh/hostinger_deploy_key -P "$PORT" release.tar.gz "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_DEPLOY_PATH/release.tar.gz"

      - name: Activate release
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          HOSTINGER_PHP_BINARY: ${{ secrets.HOSTINGER_PHP_BINARY }}
        run: |
          PORT="${HOSTINGER_PORT:-65002}"
          ssh -i ~/.ssh/hostinger_deploy_key -p "$PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "HOSTINGER_DEPLOY_PATH='$HOSTINGER_DEPLOY_PATH' HOSTINGER_PHP_BINARY='${HOSTINGER_PHP_BINARY:-php}' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$HOSTINGER_DEPLOY_PATH"
          PHP_BIN="${HOSTINGER_PHP_BINARY:-php}"

          if [ -f artisan ]; then
            "$PHP_BIN" artisan down || true
          fi

          trap 'if [ -f artisan ]; then "$PHP_BIN" artisan up || true; fi' EXIT

          tar -xzf release.tar.gz
          rm -f release.tar.gz

          mkdir -p storage/app/public storage/app/backups storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

          "$PHP_BIN" artisan migrate --force
          "$PHP_BIN" artisan config:clear
          "$PHP_BIN" artisan view:clear
          "$PHP_BIN" artisan cache:clear
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan deploy:check --production
          "$PHP_BIN" artisan queue:restart || true
          "$PHP_BIN" artisan up

          trap - EXIT
          REMOTE
